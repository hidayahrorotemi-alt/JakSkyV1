<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JakSky Live Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand">JakSky <span>Live Chat</span></div>
      <p class="sub">Masuk pakai nama kamu lalu mulai chat real-time.</p>

      <form id="loginForm">
        <label>Nama Kamu</label>
        <input id="nameInput" type="text" placeholder="Contoh: Pun" maxlength="25" required />

        <label>Pilih Room</label>
        <select id="roomInput">
          <option>Umum</option>
          <option>Bantuan</option>
          <option>Jualan</option>
          <option>Admin</option>
        </select>

        <button type="submit">Masuk Chat</button>
      </form>

      <div class="hint">
        Admin code default: <b>jaksky123</b>
      </div>
    </div>
  </section>

  <main id="chatPage" class="chat-page hidden">
    <aside class="sidebar">
      <div class="side-title">Online</div>
      <div id="onlineCount" class="online-count">0 user</div>
      <div id="userList" class="user-list"></div>

      <button id="clearBtn" class="clear-btn">Hapus Chat Room</button>
    </aside>

    <section class="chat-box">
      <header class="chat-header">
        <div>
          <h1>JakSky Live Chat</h1>
          <p id="roomLabel">Room: Umum</p>
        </div>
        <div class="status">● Online</div>
      </header>

      <div id="messages" class="messages"></div>

      <div id="typingBox" class="typing"></div>

      <form id="messageForm" class="message-form">
        <input id="messageInput" type="text" placeholder="Ketik pesan..." autocomplete="off" />
        <button type="submit">Kirim</button>
      </form>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
